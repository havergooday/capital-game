<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수도 삼각측량</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: #9ca3af; font-size: 0.9rem; margin-top: 6px; }
    .day-badge {
      display: inline-block;
      margin-top: 10px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 999px;
      padding: 3px 14px;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .game-area { width: 100%; max-width: 560px; }

    /* 입력창 */
    .input-wrap {
      position: relative;
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    #city-input {
      flex: 1;
      padding: 13px 16px;
      background: #1f2937;
      border: 2px solid #374151;
      border-radius: 10px;
      color: #f3f4f6;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #city-input:focus { border-color: #3b82f6; }
    #city-input:disabled { opacity: 0.5; }

    #submit-btn {
      padding: 13px 22px;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #submit-btn:hover:not(:disabled) { background: #2563eb; }
    #submit-btn:disabled { opacity: 0.5; cursor: default; }

    /* 자동완성 */
    .autocomplete-box {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 80px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .ac-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.92rem;
      display: flex;
      justify-content: space-between;
    }
    .ac-item:hover, .ac-item.active { background: #374151; }
    .ac-country { color: #6b7280; font-size: 0.82rem; }

    /* 에러 */
    #error-msg {
      min-height: 22px;
      font-size: 0.85rem;
      color: #f87171;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    /* 통계 바 */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .stats-row span { font-size: 0.82rem; color: #6b7280; }

    /* 추측 목록 */
    .guess-list { display: flex; flex-direction: column; gap: 7px; }

    .guess-card {
      background: #1f2937;
      border-radius: 10px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 110px;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .guess-card.rank-1 { border-left-color: #22c55e; }
    .guess-card.rank-2 { border-left-color: #84cc16; }
    .guess-card.rank-3 { border-left-color: #eab308; }

    .gc-city { font-weight: 600; font-size: 0.97rem; }
    .gc-country { color: #9ca3af; font-size: 0.82rem; }
    .gc-dist {
      font-variant-numeric: tabular-nums;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: right;
    }

    /* 거리 바 */
    .bar-wrap {
      grid-column: 1 / -1;
      background: #374151;
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    /* 승리 패널 */
    #win-panel {
      display: none;
      background: #052e16;
      border: 1px solid #16a34a;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    #win-panel h2 { color: #4ade80; font-size: 1.4rem; margin-bottom: 6px; }
    #win-panel p { color: #86efac; font-size: 0.95rem; margin-bottom: 16px; }
    #share-btn {
      padding: 10px 24px;
      background: #16a34a;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #share-btn:hover { background: #15803d; }
    #copy-msg {
      font-size: 0.8rem;
      color: #4ade80;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>

<header>
  <h1>🌍 수도 삼각측량</h1>
  <p>오늘의 수도를 맞혀보세요 · 방향 없이 거리만 알려줍니다</p>
  <div class="day-badge" id="day-badge">#0</div>
</header>

<div class="game-area">

  <div id="win-panel">
    <h2 id="win-title">🎉 정답!</h2>
    <p id="win-desc"></p>
    <button id="share-btn" onclick="shareResult()">결과 공유 📋</button>
    <div id="copy-msg"></div>
  </div>

  <div class="input-wrap" id="input-wrap">
    <input
      id="city-input"
      type="text"
      placeholder="수도 이름 입력..."
      autocomplete="off"
      spellcheck="false"
    >
    <button id="submit-btn" onclick="submitGuess()">확인</button>
    <div class="autocomplete-box" id="ac-box" style="display:none"></div>
  </div>
  <div id="error-msg"></div>

  <div class="stats-row">
    <span id="attempt-count">0회 시도</span>
    <span>거리 가까운 순</span>
  </div>

  <div class="guess-list" id="guess-list"></div>
</div>

// ──────────────────────────────────────────
//  Haversine 거리 계산 (km)
// ──────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

// ──────────────────────────────────────────
//  오늘의 정답 (날짜 기반)
// ──────────────────────────────────────────
function getDailyAnswer() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  let h = seed ^ (seed >>> 16);
  h = Math.imul(h, 0x45d9f3b) | 0;
  h = h ^ (h >>> 16);
  return CAPITALS[Math.abs(h) % CAPITALS.length];
}

function getDayNumber() {
  const origin = new Date(2025, 0, 1);
  const today  = new Date();
  return Math.floor((today - origin) / 86400000) + 1;
}

// ──────────────────────────────────────────
//  게임 상태
// ──────────────────────────────────────────
const ANSWER  = getDailyAnswer();
let guesses   = [];   // { city, dist }
let won       = false;
let acIndex   = -1;   // 자동완성 커서

document.getElementById('day-badge').textContent = '#' + getDayNumber();

// ──────────────────────────────────────────
//  거리 → 색상
// ──────────────────────────────────────────
function distColor(km) {
  if (km === 0)     return '#4ade80';
  if (km < 500)     return '#22c55e';
  if (km < 1500)    return '#84cc16';
  if (km < 3000)    return '#eab308';
  if (km < 6000)    return '#f97316';
  return '#ef4444';
}

// 막대 너비: 지구 최대 반거리 ~10000km 기준
function barWidth(km) {
  return Math.max(2, Math.round((1 - Math.min(km, 10000) / 10000) * 100));
}

// ──────────────────────────────────────────
//  화면 렌더링
// ──────────────────────────────────────────
function render() {
  document.getElementById('attempt-count').textContent = `${guesses.length}회 시도`;

  const sorted = [...guesses].sort((a, b) => a.dist - b.dist);
  const listEl = document.getElementById('guess-list');
  listEl.innerHTML = '';

  sorted.forEach((g, i) => {
    const color = distColor(g.dist);
    const width = barWidth(g.dist);
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';

    const card = document.createElement('div');
    card.className = `guess-card ${rankClass}`;
    card.innerHTML = `
      <div>
        <div class="gc-city">${g.city.n}</div>
        <div class="gc-country">${g.city.c}</div>
      </div>
      <div></div>
      <div class="gc-dist" style="color:${color}">
        ${g.dist === 0 ? '🎯 정답!' : g.dist.toLocaleString() + ' km'}
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${width}%;background:${color}"></div>
      </div>
    `;
    listEl.appendChild(card);
  });
}

// ──────────────────────────────────────────
//  추측 제출
// ──────────────────────────────────────────
function submitGuess() {
  if (won) return;
  const input = document.getElementById('city-input');
  const val   = input.value.trim();
  if (!val) return;

  closeAC();

  const found = CAPITALS.find(c => c.n === val);
  if (!found) {
    showError(`"${val}" 은(는) 목록에 없는 도시입니다`);
    return;
  }
  if (guesses.some(g => g.city.n === found.n)) {
    showError('이미 시도한 도시입니다');
    return;
  }

  showError('');
  const dist = haversine(found.lat, found.lng, ANSWER.lat, ANSWER.lng);
  guesses.push({ city: found, dist });
  input.value = '';
  render();

  if (dist === 0) {
    won = true;
    showWin();
  }
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

function showWin() {
  const panel = document.getElementById('win-panel');
  panel.style.display = 'block';
  document.getElementById('win-title').textContent = `🎉 ${ANSWER.n} (${ANSWER.c})`;
  document.getElementById('win-desc').textContent =
    `${guesses.length}번 만에 맞혔습니다!`;
  document.getElementById('city-input').disabled = true;
  document.getElementById('submit-btn').disabled = true;
  panel.scrollIntoView({ behavior: 'smooth' });
}

// ──────────────────────────────────────────
//  공유
// ──────────────────────────────────────────
function shareResult() {
  const sorted = [...guesses].sort((a, b) => a.dist - b.dist);
  const top5   = sorted.slice(0, 5);

  const lines = top5.map(g => {
    const km = g.dist.toLocaleString();
    const bar = g.dist === 0 ? '🟢' :
                g.dist < 1000 ? '🟡' :
                g.dist < 5000 ? '🟠' : '🔴';
    return `${bar} ${g.city.n.padEnd(8)} ${km} km`;
  });

  const text = [
    `🌍 수도 삼각측량 #${getDayNumber()}`,
    `✅ ${guesses.length}번 만에 클리어!`,
    '',
    ...lines,
    '',
    '나도 풀어봐 → capital-game/index.html'
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-msg').textContent = '클립보드에 복사됐습니다!';
  }).catch(() => {
    prompt('아래 텍스트를 복사하세요:', text);
  });
}

// ──────────────────────────────────────────
//  자동완성
// ──────────────────────────────────────────
const input = document.getElementById('city-input');
const acBox = document.getElementById('ac-box');

input.addEventListener('input', () => {
  acIndex = -1;
  const val = input.value.trim();
  if (!val) { closeAC(); return; }

  const matches = CAPITALS.filter(c => c.n.startsWith(val)).slice(0, 8);
  if (!matches.length) { closeAC(); return; }

  acBox.innerHTML = matches.map((c, i) =>
    `<div class="ac-item" data-name="${c.n}" onclick="selectAC('${c.n}')">
      <span>${c.n}</span>
      <span class="ac-country">${c.c}</span>
    </div>`
  ).join('');
  acBox.style.display = 'block';
});

input.addEventListener('keydown', e => {
  const items = acBox.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    if (items[acIndex]) input.value = items[acIndex].dataset.name;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    if (acIndex >= 0 && items[acIndex]) input.value = items[acIndex].dataset.name;
  } else if (e.key === 'Enter') {
    e.preventDefault();
    closeAC();
    submitGuess();
  } else if (e.key === 'Escape') {
    closeAC();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) closeAC();
});

function selectAC(name) {
  input.value = name;
  closeAC();
  input.focus();
}

function closeAC() {
  acBox.style.display = 'none';
  acBox.innerHTML = '';
}
</script>

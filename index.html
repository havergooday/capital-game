<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 수도 · 오늘의 나라</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #3b82f6;
      --bg: #111827;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: #f3f4f6;
      min-height: 100vh;
      transition: background 0.4s;
    }

    /* ── 홈 화면 ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 20px 80px;
    }
    .home-logo { font-size: 3.2rem; margin-bottom: 12px; }
    .home-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    .home-sub {
      color: #9ca3af;
      font-size: 0.95rem;
      margin-top: 8px;
      margin-bottom: 52px;
      text-align: center;
    }
    .mode-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 740px;
    }
    .mode-card {
      background: #1f2937;
      border: 2px solid #374151;
      border-radius: 18px;
      padding: 36px 28px;
      width: 210px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
      text-align: center;
      user-select: none;
    }
    .mode-card:hover { transform: translateY(-5px); box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
    .mode-card.capital:hover { border-color: #3b82f6; }
    .mode-card.country:hover { border-color: #8b5cf6; }
    .mode-icon { font-size: 2.8rem; margin-bottom: 14px; }
    .mode-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    .mode-card.capital .mode-name { color: #60a5fa; }
    .mode-card.country .mode-name { color: #a78bfa; }
    .mode-desc { color: #9ca3af; font-size: 0.83rem; line-height: 1.55; }

    /* ── 게임 화면 ── */
    #game {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 80px;
    }
    .back-btn {
      align-self: flex-start;
      background: none;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.88rem;
      padding: 6px 14px;
      margin-bottom: 20px;
      max-width: 560px;
      width: 100%;
      text-align: left;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: #f3f4f6; border-color: #6b7280; }

    header { text-align: center; margin-bottom: 32px; width: 100%; max-width: 560px; }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: #9ca3af; font-size: 0.9rem; margin-top: 6px; }
    .day-badge {
      display: inline-block;
      margin-top: 10px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 999px;
      padding: 3px 14px;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .game-area { width: 100%; max-width: 560px; }

    .input-wrap {
      position: relative;
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    #guess-input {
      flex: 1;
      padding: 13px 16px;
      background: #1f2937;
      border: 2px solid #374151;
      border-radius: 10px;
      color: #f3f4f6;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #guess-input:focus { border-color: var(--accent); }
    #guess-input:disabled { opacity: 0.5; }

    #submit-btn {
      padding: 13px 22px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #submit-btn:hover:not(:disabled) { opacity: 0.82; }
    #submit-btn:disabled { opacity: 0.5; cursor: default; }

    .autocomplete-box {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 80px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .ac-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.92rem;
      display: flex;
      justify-content: space-between;
    }
    .ac-item:hover, .ac-item.active { background: #374151; }
    .ac-sub { color: #6b7280; font-size: 0.82rem; }

    #error-msg {
      min-height: 22px;
      font-size: 0.85rem;
      color: #f87171;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .stats-row span { font-size: 0.82rem; color: #6b7280; }

    .guess-list { display: flex; flex-direction: column; gap: 7px; }

    .guess-card {
      background: #1f2937;
      border-radius: 10px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 110px;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .guess-card.rank-1 { border-left-color: #22c55e; }
    .guess-card.rank-2 { border-left-color: #84cc16; }
    .guess-card.rank-3 { border-left-color: #eab308; }

    .gc-name    { font-weight: 600; font-size: 0.97rem; }
    .gc-sub     { color: #9ca3af; font-size: 0.82rem; }
    .gc-dist    { font-variant-numeric: tabular-nums; font-size: 0.95rem; font-weight: 700; text-align: right; }

    .bar-wrap {
      grid-column: 1 / -1;
      background: #374151;
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }

    #win-panel {
      display: none;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    #win-panel h2 { font-size: 1.4rem; margin-bottom: 6px; }
    #win-panel p  { font-size: 0.95rem; margin-bottom: 16px; }

    #win-panel.capital { background: #052e16; border: 1px solid #16a34a; }
    #win-panel.capital h2 { color: #4ade80; }
    #win-panel.capital p  { color: #86efac; }

    #win-panel.country { background: #1e1040; border: 1px solid #7c3aed; }
    #win-panel.country h2 { color: #a78bfa; }
    #win-panel.country p  { color: #c4b5fd; }

    #share-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #share-btn:hover { opacity: 0.85; }
    #win-panel.capital #share-btn { background: #16a34a; }
    #win-panel.country #share-btn { background: #7c3aed; }

    #copy-msg { font-size: 0.8rem; margin-top: 8px; min-height: 18px; }
    #win-panel.capital #copy-msg { color: #4ade80; }
    #win-panel.country #copy-msg { color: #a78bfa; }

    #wiki-card {
      background: #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .wiki-loading {
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
      padding: 8px 0;
    }
    .wiki-body {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .wiki-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .wiki-text h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f3f4f6;
    }
    .wiki-desc {
      font-size: 0.82rem;
      color: #9ca3af;
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0 0 10px;
    }
    .wiki-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
    }
    .wiki-link:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .mode-cards { gap: 14px; }
      .mode-card  { width: 100%; max-width: 320px; padding: 28px 22px; }
    }
  </style>
</head>

<!-- ── 홈 화면 ── -->
<div id="home">
  <div class="home-logo">🌍</div>

  <div class="mode-cards">
    <div class="mode-card capital" onclick="startGame('capital')">

      <div class="mode-name">오늘의 수도</div>
      <div class="mode-desc">세계 195개 수도 중<br>오늘의 정답을 맞혀보세요</div>
    </div>
    <div class="mode-card country" onclick="startGame('country')">
      <div class="mode-icon">🗺️</div>
      <div class="mode-name">오늘의 나라</div>
      <div class="mode-desc">세계 195개 나라 중<br>오늘의 정답을 맞혀보세요</div>
    </div>
  </div>
</div>

<!-- ── 게임 화면 ── -->
<div id="game">

  <header>

    <div class="day-badge" id="day-badge">#0</div>
  </header>
  <div class="game-area">
    <div id="win-panel">
      <h2 id="win-title"></h2>
      <p id="win-desc"></p>
      <button id="share-btn" onclick="shareResult()">결과 공유 📋</button>
      <div id="copy-msg"></div>
    </div>
    <div id="wiki-card" style="display:none"></div>
    <div class="input-wrap" id="input-wrap">
      <input id="guess-input" type="text" placeholder="" autocomplete="off" spellcheck="false">
      <button id="submit-btn" onclick="submitGuess()">확인</button>
      <div class="autocomplete-box" id="ac-box" style="display:none"></div>
    </div>
    <div id="error-msg"></div>
    <div class="stats-row">
      <span id="attempt-count">0회 시도</span>
      <span>거리 가까운 순</span>
    </div>
    <div class="guess-list" id="guess-list"></div>
  </div>
</div>

  capital: {
    data: CAPITALS,
    getLabel: item => item.c,
    title: '🏛️ 오늘의 수도',
    subtitle: '방향 없이 거리만으로 오늘의 수도를 맞혀보세요',
    placeholder: '수도 이름 입력...',
    shareTitle: '오늘의 수도',
    bg: '#111827',
    accent: '#3b82f6',
    salt: 0,
  },
  country: {
    data: COUNTRIES,
    getLabel: item => item.r,
    title: '🗺️ 오늘의 나라',
    subtitle: '방향 없이 거리만으로 오늘의 나라를 맞혀보세요',
    placeholder: '나라 이름 입력...',

    bg: '#130f1f',
    accent: '#8b5cf6',
    salt: 2000,
  },
};

// ──────────────────────────────────────────
//  유틸
// ──────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function getDailyAnswer(data, salt) {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate() + salt;
  let h = seed ^ (seed >>> 16);
  h = Math.imul(h, 0x45d9f3b) | 0;
  h = h ^ (h >>> 16);
  return data[Math.abs(h) % data.length];
}

function getDayNumber() {
  const origin = new Date(2025, 0, 1);
  return Math.floor((new Date() - origin) / 86400000) + 1;
}

function distColor(km) {
  if (km === 0)   return '#4ade80';
  if (km < 500)   return '#22c55e';
  if (km < 1500)  return '#84cc16';
  if (km < 3000)  return '#eab308';
  if (km < 6000)  return '#f97316';
  return '#ef4444';
}

function barWidth(km) {
  return Math.max(2, Math.round((1 - Math.min(km, 10000) / 10000) * 100));
}

let currentMode = null;
let ANSWER = null;
let guesses = [];
let won = false;
let acIndex = -1;

// ──────────────────────────────────────────
//  라우팅
// ──────────────────────────────────────────
function startGame(mode) {
  currentMode = mode;
  const cfg = MODES[mode];

  ANSWER  = getDailyAnswer(cfg.data, cfg.salt);
  guesses = [];
  won     = false;
  acIndex = -1;

  document.documentElement.style.setProperty('--accent', cfg.accent);
  document.documentElement.style.setProperty('--bg', cfg.bg);

  document.getElementById('game-title').textContent    = cfg.title;
  document.getElementById('game-subtitle').textContent = cfg.subtitle;
  document.getElementById('guess-input').placeholder    = cfg.placeholder;
  document.getElementById('day-badge').textContent     = '#' + getDayNumber();

  const winPanel = document.getElementById('win-panel');
  winPanel.className    = mode;
  winPanel.style.display = 'none';

  const inp = document.getElementById('guess-input');
  inp.value   = '';
  inp.disabled = false;
  document.getElementById('submit-btn').disabled       = false;
  document.getElementById('error-msg').textContent     = '';
  document.getElementById('guess-list').innerHTML      = '';
  document.getElementById('attempt-count').textContent = '0회 시도';
  document.getElementById('copy-msg').textContent      = '';
  document.getElementById('wiki-card').style.display   = 'none';
  document.getElementById('wiki-card').innerHTML        = '';
  closeAC();

  location.hash = mode;

  document.getElementById('home').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  document.getElementById('guess-input').focus();
}

function goHome() {
  location.hash = '';
  document.documentElement.style.setProperty('--bg', '#111827');
  document.getElementById('game').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  currentMode = null;
}

window.addEventListener('load', () => {
  const hash = location.hash.slice(1);
  if (hash in MODES) startGame(hash);
});

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (hash in MODES) startGame(hash);
  else if (!hash) goHome();
});

// ──────────────────────────────────────────
//  렌더링
// ──────────────────────────────────────────
function render() {
  document.getElementById('attempt-count').textContent = `${guesses.length}회 시도`;
  const cfg    = MODES[currentMode];
  const sorted = [...guesses].sort((a, b) => a.dist - b.dist);
  const listEl = document.getElementById('guess-list');
  listEl.innerHTML = '';

  sorted.forEach((g, i) => {
    const color     = distColor(g.dist);
    const width     = barWidth(g.dist);
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const sub       = cfg.getLabel(g.item);
    const card      = document.createElement('div');
    card.className  = `guess-card ${rankClass}`;
    card.innerHTML  = `
      <div>
        <div class="gc-name">${g.item.n}</div>
        <div class="gc-sub">${sub}</div>
      </div>
      <div></div>
      <div class="gc-dist" style="color:${color}">
        ${g.dist === 0 ? '🎯 정답!' : g.dist.toLocaleString() + ' km'}
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${width}%;background:${color}"></div>
      </div>`;
    listEl.appendChild(card);
  });
}

// ──────────────────────────────────────────
//  추측 제출
// ──────────────────────────────────────────
function submitGuess() {
  if (won) return;
  const input = document.getElementById('guess-input');
  const val   = input.value.trim();
  if (!val) return;

  closeAC();

  const data  = MODES[currentMode].data;
  const found = data.find(item => item.n === val);
  if (!found) {
    showError(`"${val}" 은(는) 목록에 없습니다`);
    return;
  }
  if (guesses.some(g => g.item.n === found.n)) {
    showError('이미 시도한 항목입니다');
    return;
  }

  showError('');
  const dist = haversine(found.lat, found.lng, ANSWER.lat, ANSWER.lng);
  guesses.push({ item: found, dist });
  input.value = '';
  render();

  if (dist === 0) {
    won = true;
    showWin();
  }
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

async function showWin() {
  const panel = document.getElementById('win-panel');
  panel.style.display = 'block';
  const sub = currentMode === 'country' ? ANSWER.r : ANSWER.c;
  document.getElementById('win-title').textContent = `🎉 ${ANSWER.n} (${sub})`;
  document.getElementById('win-desc').textContent  = `${guesses.length}번 만에 맞혔습니다!`;
  document.getElementById('guess-input').disabled   = true;
  document.getElementById('submit-btn').disabled   = true;
  panel.scrollIntoView({ behavior: 'smooth' });

  const wikiCard = document.getElementById('wiki-card');
  wikiCard.style.display = 'block';
  wikiCard.innerHTML = '<div class="wiki-loading">정보를 불러오는 중...</div>';
  const data = await fetchWiki(ANSWER.n);
  renderWikiCard(data);

}

async function fetchWiki(name) {
  try {
    const res = await fetch(
      `https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
    );
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

function renderWikiCard(data) {
  const card = document.getElementById('wiki-card');
  if (!data || data.type === 'disambiguation') {
    card.style.display = 'none';
    return;
  }
  const thumb = data.thumbnail
    ? `<img class="wiki-thumb" src="${data.thumbnail.source}" alt="${data.title}">`
    : '';
  card.innerHTML = `
    <div class="wiki-body">
      ${thumb}
      <div class="wiki-text">
        <h3>${data.title}</h3>
        <p class="wiki-desc">${data.extract || ''}</p>
        <a class="wiki-link" href="${data.content_urls.desktop.page}" target="_blank" rel="noopener">Wikipedia에서 더 보기 →</a>
      </div>
    </div>`;
}

// ──────────────────────────────────────────
//  공유
// ──────────────────────────────────────────
function shareResult() {
  const sorted = [...guesses].sort((a, b) => a.dist - b.dist);
  const cfg    = MODES[currentMode];
  const lines  = sorted.slice(0, 5).map(g => {
    const bar = g.dist === 0 ? '🟢' : g.dist < 1000 ? '🟡' : g.dist < 5000 ? '🟠' : '🔴';
    return `${bar} ${g.item.n.padEnd(8)} ${g.dist.toLocaleString()} km`;
  });
  const url  = `${location.origin}${location.pathname}#${currentMode}`;
  const text = [
    `🌍 ${cfg.shareTitle} #${getDayNumber()}`,
    `✅ ${guesses.length}번 만에 클리어!`,
    '',
    ...lines,
    '',
    url,
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-msg').textContent = '클립보드에 복사됐습니다!';
  }).catch(() => {
    prompt('아래 텍스트를 복사하세요:', text);
  });
}

// ──────────────────────────────────────────
//  자동완성
// ──────────────────────────────────────────
const inputEl = document.getElementById('guess-input');
const acBox   = document.getElementById('ac-box');

inputEl.addEventListener('input', () => {
  acIndex = -1;
  const val = inputEl.value.trim();
  if (!val || !currentMode) { closeAC(); return; }

  const cfg     = MODES[currentMode];
  const matches = cfg.data.filter(item => item.n.includes(val)).slice(0, 8);
  if (!matches.length) { closeAC(); return; }

  acBox.innerHTML = matches.map(item =>
    `<div class="ac-item" data-name="${item.n}" onclick="selectAC('${item.n}')">
      <span>${item.n}</span>
      <span class="ac-sub">${cfg.getLabel(item)}</span>
    </div>`
  ).join('');
  acBox.style.display = 'block';
});

inputEl.addEventListener('keydown', e => {
  const items = acBox.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    if (items[acIndex]) inputEl.value = items[acIndex].dataset.name;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    if (acIndex >= 0 && items[acIndex]) inputEl.value = items[acIndex].dataset.name;
  } else if (e.key === 'Enter') {
    e.preventDefault();
    closeAC();
    submitGuess();
  } else if (e.key === 'Escape') {
    closeAC();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) closeAC();
});

function selectAC(name) {
  inputEl.value = name;
  closeAC();
  inputEl.focus();
}

function closeAC() {
  acBox.style.display = 'none';
  acBox.innerHTML = '';
}
</script>
